<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alika Risqi Handayani</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#eef6ff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:white;
      width:340px;
      padding:35px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    h1{
      color:#2c3e50;
      margin-bottom:10px;
    }

    p{
      color:#6b7280;
      margin-bottom:30px;
    }

    a{
      display:block;
      text-decoration:none;
      background:#cfe8ff;
      color:#1f2937;
      padding:14px;
      border-radius:12px;
      margin:12px 0;
      font-weight:bold;
      transition:.3s;
    }

    a:hover{
      background:#9fd0ff;
      transform:translateY(-2px);
    }

    footer{
      margin-top:25px;
      color:#9ca3af;
      font-size:13px;
    }
  </style>
</head>
