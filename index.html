<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>alikaarh</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#f5f5f7;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:25px;

animation:fade .8s ease;

}

.card{

width:360px;

text-align:center;

animation:up .9s ease;

}

.logo{

width:78px;
height:78px;

margin:auto;

margin-bottom:26px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

box-shadow:
0 8px 25px rgba(0,0,0,.08);

}

h1{

font-size:34px;

font-weight:600;

color:#1d1d1f;

margin-bottom:40px;

letter-spacing:-1px;

}

.link{

display:flex;

justify-content:center;

align-items:center;

text-decoration:none;

margin:15px 0;

padding:18px;

border-radius:18px;

background:white;

color:#1d1d1f;

font-size:17px;

font-weight:500;

transition:.25s;

box-shadow:
0 4px 15px rgba(0,0,0,.06);

}

.link:hover{

transform:translateY(-3px);

background:#ffffff;

box-shadow:
0 12px 28px rgba(0,0,0,.12);

}

footer{

margin-top:40px;

font-size:13px;

color:#8e8e93;

}

@keyframes fade{

from{
opacity:0;
}

to{
opacity:1;
}

}

@keyframes up{

from{

opacity:0;

transform:translateY(35px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
☁️
</div>

<h1>alikaarh</h1>

<a class="link" href="https://medium.com/@alikaarh" target="_blank">
✍️ Medium
</a>

<a class="link" href="https://www.goodreads.com/user/show/201905824" target="_blank">
📖 Goodreads
</a>

<a class="link" href="https://boxd.it/melYN" target="_blank">
🎬 Letterboxd
</a>

<footer>
Designed with  inspired minimalism
</footer>

</div>

</body>
</html>
